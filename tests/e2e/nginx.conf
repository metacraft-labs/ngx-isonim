# Test nginx configuration for ngx-isonim E2E tests.
# The module .so is loaded via load_module when available.
#
# Start with:
#   nginx -c /path/to/this/nginx.conf -p /tmp/ngx-isonim-test

load_module ngx_http_isonim_module.so;

worker_processes 1;
error_log /tmp/ngx-isonim-test/error.log;
pid /tmp/ngx-isonim-test/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log /tmp/ngx-isonim-test/access.log;
    client_body_temp_path /tmp/ngx-isonim-test/client_body;
    proxy_temp_path /tmp/ngx-isonim-test/proxy;
    fastcgi_temp_path /tmp/ngx-isonim-test/fastcgi;
    uwsgi_temp_path /tmp/ngx-isonim-test/uwsgi;
    scgi_temp_path /tmp/ngx-isonim-test/scgi;

    server {
        listen 8088;

        location /hello {
            isonim_ssr on;
            isonim_ssr_app hello;
            isonim_ssr_hydration off;
        }

        location /hello-hydrated {
            isonim_ssr on;
            isonim_ssr_app hello;
            isonim_ssr_hydration on;
        }

        location /hello-csp {
            isonim_ssr on;
            isonim_ssr_app hello;
            isonim_ssr_hydration on;
            isonim_ssr_script_nonce abc123;
        }

        location /tasks {
            isonim_ssr on;
            isonim_ssr_app task_manager;
            isonim_ssr_hydration on;
        }

        location /async {
            isonim_ssr on;
            isonim_ssr_app async_dashboard;
            isonim_ssr_hydration on;
        }

        location /health {
            return 200 "ok";
        }
    }
}
